<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Precious Temiloluwa 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Quicksand:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:     #f7789a;
    --coral:    #ff6b8a;
    --gold:     #f9c74f;
    --lavender: #c9b8f0;
    --mint:     #a8e6cf;
    --deep:     #1a0828;
  }

  html, body {
    width: 100%; height: 100%;
    background: #0d0014;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
  }

  /* ════════════════════════════════════
     HERO CARD
  ════════════════════════════════════ */
  .hero {
    position: relative;
    /* Portrait ratio — great for screenshots */
    width: min(480px, 96vw);
    height: min(820px, 96vh);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 0 0 1.5px rgba(255,180,220,0.25),
      0 30px 90px rgba(0,0,0,0.7),
      0 0 60px rgba(200,80,160,0.15);
    /* Fallback before video */
    background: radial-gradient(ellipse at 50% 30%, #3a0a50, #0d0014);
    display: flex;
    flex-direction: column;
    /* Push content to bottom — leaves face area clear */
    justify-content: flex-end;
  }

  /* ── VIDEO (fills entire card, face shows top-center) ── */
  .video-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top; /* keeps face near top of frame */
    z-index: 0;
  }

  /* ── OVERLAY: only darkens bottom & edges, center stays clear ── */
  .video-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    /* Radial: transparent center, soft purple-dark edges */
    background:
      radial-gradient(ellipse 80% 60% at 50% 38%,
        rgba(0,0,0,0)       0%,
        rgba(10,0,20,0.08)  50%,
        rgba(10,0,20,0.45)  100%
      ),
      /* Strong bottom gradient so text panel pops */
      linear-gradient(to top,
        rgba(10, 0, 25, 0.96) 0%,
        rgba(10, 0, 25, 0.82) 22%,
        rgba(10, 0, 25, 0.30) 42%,
        rgba(0,  0,  0, 0)    60%
      );
  }

  /* ── SPARKLE DOTS (very subtle, don't fight video) ── */
  .sparkle-layer {
    position: absolute;
    inset: 0; z-index: 2;
    background-image:
      radial-gradient(circle, rgba(249,199,79,0.55) 1px, transparent 1px),
      radial-gradient(circle, rgba(247,120,154,0.4) 1px, transparent 1px),
      radial-gradient(circle, rgba(201,184,240,0.45) 1.5px, transparent 1.5px);
    background-size: 90px 90px, 60px 60px, 120px 120px;
    background-position: 15px 15px, 45px 45px, 30px 70px;
    opacity: 0.22;
    pointer-events: none;
  }

  /* ── CONFETTI ── */
  #confetti {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 10;
  }

  /* ── BALLOONS (float in upper half only) ── */
  .balloons {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 65%;
    pointer-events: none; z-index: 4;
    overflow: hidden;
  }
  .balloon { position: absolute; bottom: 0; animation: floatUp linear infinite; }
  .balloon svg { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35)); }

  /* ── MUSIC ICON ── */
  .music-note {
    position: absolute; top: 14px; right: 16px; z-index: 30;
    font-size: 20px; cursor: pointer; user-select: none;
    animation: pulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    padding: 6px 9px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* ── TOP BANNER (absolute, sits at very top) ── */
  .banner {
    position: absolute;
    top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    white-space: nowrap;
    background: linear-gradient(135deg, rgba(255,107,138,0.9), rgba(224,96,160,0.9));
    backdrop-filter: blur(8px);
    color: #fff;
    font-weight: 700;
    font-size: clamp(9px, 2.2vw, 11px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 6px 20px;
    border-radius: 100px;
    box-shadow: 0 4px 20px rgba(240,80,130,0.4);
    animation: fadeDown 0.8s ease both;
  }

  /* ════════════════════════════════════
     BOTTOM CONTENT PANEL
     (floats above the dark gradient)
  ════════════════════════════════════ */
  .content-panel {
    position: relative;
    z-index: 15;
    width: 100%;
    padding: clamp(16px, 4vw, 28px) clamp(16px, 5vw, 32px) clamp(14px, 3vw, 20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px, 1.5vw, 10px);
  }

  /* ── CAKE (small, sits just above heading) ── */
  .cake-wrap {
    animation: popIn 0.9s cubic-bezier(.175,.885,.32,1.275) 0.2s both;
    line-height: 0;
  }
  .cake-svg {
    width: clamp(80px, 16vw, 120px);
    height: auto;
    filter: drop-shadow(0 4px 16px rgba(249,199,79,0.5));
  }
  .flame { animation: flicker 0.48s ease-in-out infinite alternate; transform-origin: bottom center; }
  .flame:nth-child(2) { animation-delay: 0.16s; }
  .flame:nth-child(3) { animation-delay: 0.32s; }

  /* ── HEADING ── */
  .heading-wrap {
    text-align: center;
    animation: fadeUp 0.8s ease 0.35s both;
    line-height: 1;
  }
  .happy {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(28px, 7.5vw, 48px);
    color: #ffcce0;
    text-shadow: 0 0 30px rgba(255,140,180,0.7), 0 2px 12px rgba(0,0,0,0.4);
    line-height: 1.1;
  }
  .birthday {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 6vw, 40px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5), 0 0 40px rgba(255,180,210,0.3);
    line-height: 1;
  }

  /* ── NAME ── */
  .name-wrap {
    text-align: center;
    animation: fadeUp 0.8s ease 0.5s both;
  }
  .name-line1 {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-weight: 700;
    font-size: clamp(32px, 8.5vw, 58px);
    background: linear-gradient(120deg, #ffcce0 0%, #f9c74f 45%, #ddd0ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.05;
    filter: drop-shadow(0 2px 12px rgba(255,160,200,0.5));
  }
  .name-line2 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(22px, 5.5vw, 44px);
    color: #e8d5ff;
    text-shadow: 0 0 20px rgba(180,130,255,0.6), 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1.1;
  }

  /* ── STARS ── */
  .stars {
    font-size: clamp(14px, 3vw, 20px);
    letter-spacing: 0.2em;
    animation: fadeUp 0.8s ease 0.65s both;
  }

  /* ── MESSAGE CARD ── */
  .message {
    width: 100%;
    text-align: center;
    animation: fadeUp 0.8s ease 0.8s both;
    padding: clamp(10px, 2.5vw, 14px) clamp(14px, 4vw, 22px);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .message p {
    font-size: clamp(11px, 2.4vw, 14px);
    color: rgba(255,255,255,0.92);
    line-height: 1.75;
    font-weight: 500;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .emoji-row {
    font-size: clamp(14px, 3.2vw, 19px);
    margin-top: 6px;
    letter-spacing: 0.12em;
  }

  /* ── FOOTER ── */
  .footer-tag {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: fadeUp 0.8s ease 0.95s both;
  }
  .footer-love {
    font-size: clamp(9px, 1.8vw, 11px);
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(232, 200, 255, 0.75);
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }
  .footer-credit {
    font-size: clamp(10px, 2vw, 12px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 16px rgba(249,199,79,0.6), 0 1px 6px rgba(0,0,0,0.5);
    text-align: center;
    width: 100%;
  }

  /* ════════════════════════════════════
     KEYFRAMES
  ════════════════════════════════════ */
  @keyframes fadeDown { from{opacity:0;transform:translateX(-50%) translateY(-16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes popIn    { from{opacity:0;transform:scale(0.4)} to{opacity:1;transform:scale(1)} }
  @keyframes floatUp  { 0%{transform:translateY(0) rotate(0deg);opacity:0.9} 100%{transform:translateY(-110%) rotate(10deg);opacity:0} }
  @keyframes flicker  { 0%{transform:scaleX(1) scaleY(1) rotate(-4deg)} 100%{transform:scaleX(0.8) scaleY(1.2) rotate(4deg)} }
  @keyframes pulse    { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.25);opacity:0.7} }
  @keyframes shimmer  { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<div class="hero" id="hero">

  <!-- 🎬 VIDEO BACKGROUND — replace "precious.mp4" with your file -->
  <video id="bgVideo" class="video-bg" autoplay muted loop playsinline>
    <source src="precious.mp4"  type="video/mp4">
    <source src="precious.webm" type="video/webm">
  </video>

  <!-- 🎵 BIRTHDAY SONG — replace "birthday.mp3" with your file -->
  <audio id="bdaySong" loop>
    <source src="birthday.mp3" type="audio/mpeg">
    <source src="birthday.ogg" type="audio/ogg">
  </audio>

  <!-- Overlays -->
  <div class="video-overlay"></div>
  <div class="sparkle-layer"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <!-- Balloons (upper area — won't cover face) -->
  <div class="balloons" id="balloons"></div>

  <!-- Top banner -->
  <div class="banner">🎉 Special Day Celebration 🎉</div>

  <!-- Music toggle -->
  <div class="music-note" id="musicNote" title="Tap to mute / unmute">🎵</div>

  <!-- ══ BOTTOM CONTENT PANEL ══ -->
  <div class="content-panel">

    <!-- Cake -->
    <div class="cake-wrap">
      <svg class="cake-svg" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="38" width="10" height="30" rx="5" fill="#f7789a"/>
        <rect x="95" y="30" width="10" height="38" rx="5" fill="#c9b8f0"/>
        <rect x="130" y="38" width="10" height="30" rx="5" fill="#a8e6cf"/>
        <ellipse class="flame" cx="65"  cy="34" rx="5" ry="8" fill="#f9c74f" opacity="0.95"/>
        <ellipse class="flame" cx="100" cy="26" rx="5" ry="8" fill="#ff9f43" opacity="0.95"/>
        <ellipse class="flame" cx="135" cy="34" rx="5" ry="8" fill="#f9c74f" opacity="0.95"/>
        <ellipse cx="65"  cy="36" rx="8" ry="6" fill="#ffec99" opacity="0.4"/>
        <ellipse cx="100" cy="28" rx="8" ry="6" fill="#ffec99" opacity="0.4"/>
        <ellipse cx="135" cy="36" rx="8" ry="6" fill="#ffec99" opacity="0.4"/>
        <rect x="55" y="68" width="90" height="32" rx="8" fill="#f7789a"/>
        <rect x="55" y="68" width="90" height="10" rx="4" fill="#ff9fc0"/>
        <path d="M63 78 Q67 88 71 78 Q75 88 79 78 Q83 88 87 78 Q91 88 95 78 Q99 88 103 78 Q107 88 111 78 Q115 88 119 78 Q123 88 127 78 Q131 88 135 78" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
        <rect x="30" y="100" width="140" height="46" rx="10" fill="#c9b8f0"/>
        <rect x="30" y="100" width="140" height="12" rx="5" fill="#ddd0ff"/>
        <path d="M38 112 Q44 126 50 112 Q56 126 62 112 Q68 126 74 112 Q80 126 86 112 Q92 126 98 112 Q104 126 110 112 Q116 126 122 112 Q128 126 134 112 Q140 126 146 112 Q152 126 158 112" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="100" cy="147" rx="75" ry="8" fill="#f9c74f" opacity="0.7"/>
        <ellipse cx="100" cy="145" rx="72" ry="6" fill="#ffd970"/>
        <rect x="55"  y="118" width="12" height="4" rx="2" fill="#ff6b8a" transform="rotate(-20,55,118)"/>
        <rect x="80"  y="125" width="12" height="4" rx="2" fill="#f9c74f" transform="rotate(15,80,125)"/>
        <rect x="110" y="120" width="12" height="4" rx="2" fill="#a8e6cf" transform="rotate(-10,110,120)"/>
        <rect x="140" y="128" width="12" height="4" rx="2" fill="#c9b8f0" transform="rotate(25,140,128)"/>
        <rect x="70"  y="130" width="10" height="4" rx="2" fill="#ff9f43" transform="rotate(-30,70,130)"/>
        <rect x="125" y="115" width="10" height="4" rx="2" fill="#f7789a" transform="rotate(10,125,115)"/>
        <text x="68"  y="92" font-size="10" text-anchor="middle" fill="white" opacity="0.9">✦</text>
        <text x="100" y="90" font-size="8"  text-anchor="middle" fill="white" opacity="0.8">✦</text>
        <text x="132" y="92" font-size="10" text-anchor="middle" fill="white" opacity="0.9">✦</text>
      </svg>
    </div>

    <!-- Heading -->
    <div class="heading-wrap">
      <div class="happy">Happy</div>
      <div class="birthday">Birthday</div>
    </div>

    <!-- Name -->
    <div class="name-wrap">
      <div class="name-line1">Precious</div>
      <div class="name-line2">Temiloluwa</div>
    </div>

    <!-- Stars -->
    <div class="stars">✨ 🌸 ⭐ 🌸 ✨</div>

    <!-- Message -->
    <div class="message">
      <p>Today the world is brighter because of YOU.<br>
      May your day be as beautiful, kind, and extraordinary<br>
      as you are, my precious little star. 💖</p>
      <div class="emoji-row">🎈 🎁 🎀 🌈 🦋 🎊</div>
    </div>

    <!-- Footer -->
    <div class="footer-tag">
      <div class="footer-love">With all our love &nbsp;•&nbsp; Always &nbsp;💕</div>
      <div class="footer-credit">Created by Adeperl🍁</div>
    </div>

  </div><!-- /.content-panel -->

</div><!-- /.hero -->

<script>
/* ── BIRTHDAY SONG ── */
const song = document.getElementById('bdaySong');
const note = document.getElementById('musicNote');

function startSong() {
  song.volume = 0.78;
  song.play().catch(() => {
    const unlock = () => song.play();
    document.addEventListener('click',      unlock, { once: true });
    document.addEventListener('touchstart', unlock, { once: true });
  });
}
startSong();

note.addEventListener('click', e => {
  e.stopPropagation();
  song.muted = !song.muted;
  note.textContent = song.muted ? '🔇' : '🎵';
});

/* ── VIDEO ── */
const vid = document.getElementById('bgVideo');
vid.muted = true;
vid.play().catch(() => {});

/* ── BALLOONS ── */
const BCOLORS  = ['#f7789a','#f9c74f','#a8e6cf','#c9b8f0','#ff9f43','#85d4ff','#ffb3de'];
const bWrap    = document.getElementById('balloons');

function makeBalloon() {
  const div  = document.createElement('div');
  div.className = 'balloon';
  const c    = BCOLORS[Math.floor(Math.random() * BCOLORS.length)];
  const size = 24 + Math.random() * 24;
  const left = 3  + Math.random() * 94;
  const dur  = 7  + Math.random() * 8;
  const del  = Math.random() * 10;
  div.style.cssText = `left:${left}%;animation-duration:${dur}s;animation-delay:-${del}s;`;
  div.innerHTML = `<svg width="${size}" height="${size*1.35}" viewBox="0 0 40 54">
    <ellipse cx="20" cy="20" rx="18" ry="20" fill="${c}" opacity="0.88"/>
    <ellipse cx="13" cy="11" rx="6" ry="7" fill="white" opacity="0.22"/>
    <polygon points="20,40 17,45 23,45" fill="${c}" opacity="0.75"/>
    <path d="M20 45 Q23 50 20 54" stroke="${c}" stroke-width="1.5" fill="none" opacity="0.65"/>
  </svg>`;
  bWrap.appendChild(div);
}
for (let i = 0; i < 12; i++) makeBalloon();

/* ── CONFETTI ── */
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');
const hero   = document.getElementById('hero');

function resize() {
  canvas.width  = hero.offsetWidth;
  canvas.height = hero.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#f7789a','#f9c74f','#c9b8f0','#a8e6cf','#ff9f43','#85d4ff','#ffffff','#ffb3de'];
const SHAPES = ['rect','circle','star'];

const pieces = Array.from({ length: 70 }, () => ({
  x:       Math.random() * (canvas.width  || 480),
  y:       Math.random() * (canvas.height || 820) - (canvas.height || 820),
  w:       5 + Math.random() * 7,
  h:       3 + Math.random() * 5,
  color:   COLORS[Math.floor(Math.random() * COLORS.length)],
  shape:   SHAPES[Math.floor(Math.random() * SHAPES.length)],
  speed:   1   + Math.random() * 2,
  angle:   Math.random() * Math.PI * 2,
  spin:    (Math.random() - 0.5) * 0.1,
  drift:   (Math.random() - 0.5) * 0.7,
  opacity: 0.65 + Math.random() * 0.35,
}));

function drawStar(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
            : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    ctx.lineTo(cx + (r / 2) * Math.cos(b), cy + (r / 2) * Math.sin(b));
  }
  ctx.closePath();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle   = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    if      (p.shape === 'rect')   ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    else if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2); ctx.fill(); }
    else                           { drawStar(0, 0, p.w / 2); ctx.fill(); }
    ctx.restore();
    p.y += p.speed; p.x += p.drift; p.angle += p.spin;
    if (p.y > canvas.height + 20) { p.y = -15; p.x = Math.random() * canvas.width; }
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
